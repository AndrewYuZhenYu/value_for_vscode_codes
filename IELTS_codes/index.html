<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IELTS 雅思词汇记忆本</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1208;
    --paper: #f5f0e8;
    --cream: #ede7d5;
    --gold: #c8922a;
    --rust: #b84c2a;
    --teal: #2a7a6e;
    --muted: #8a7d68;
    --border: #d4c9b0;
    --card-bg: #faf7f2;
    --highlight: #fff3d0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    background-image: 
      repeating-linear-gradient(0deg, transparent, transparent 31px, var(--border) 31px, var(--border) 32px);
    background-size: 100% 32px;
  }

  header {
    background: var(--ink);
    color: var(--paper);
    padding: 48px 40px 36px;
    position: relative;
    overflow: hidden;
  }

  header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      45deg, transparent, transparent 10px,
      rgba(200,146,42,0.05) 10px, rgba(200,146,42,0.05) 20px
    );
  }

  .header-inner {
    max-width: 900px;
    margin: 0 auto;
    position: relative;
  }

  .header-label {
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 12px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(32px, 5vw, 52px);
    font-weight: 900;
    line-height: 1.1;
    margin-bottom: 12px;
    letter-spacing: -1px;
  }

  .header-sub {
    color: rgba(245,240,232,0.6);
    font-size: 13px;
    letter-spacing: 0.5px;
  }

  .stats-bar {
    display: flex;
    gap: 32px;
    margin-top: 24px;
    padding-top: 24px;
    border-top: 1px solid rgba(245,240,232,0.15);
    flex-wrap: wrap;
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--gold);
  }

  .stat-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(245,240,232,0.5);
  }

  .controls {
    max-width: 900px;
    margin: 32px auto 0;
    padding: 0 24px;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
  }

  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 14px;
    pointer-events: none;
  }

  input[type=text] {
    width: 100%;
    background: var(--card-bg);
    border: 1.5px solid var(--border);
    border-radius: 4px;
    padding: 10px 14px 10px 38px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }
/* 跳转功能样式 */
.pagination {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap; /* 适配手机屏幕 */
}

.jump-group {
  display: flex;
  align-items: center;
  margin-left: 10px;
  padding-left: 10px;
  border-left: 1px solid var(--border);
  gap: 6px;
}

.jump-input {
  width: 45px;
  height: 28px;
  padding: 0 4px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--card-bg);
  text-align: center;
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  color: var(--ink);
  outline: none;
}

.jump-input:focus {
  border-color: var(--gold);
  background: white;
}

/* 隐藏输入框自带的箭头 */
.jump-input::-webkit-inner-spin-button,
.jump-input::-webkit-outer-spin-button {
  -webkit-appearance: none;
  margin: 0;
}

.jump-btn {
  padding: 4px 8px;
  font-size: 12px;
  background: var(--cream);
  border: 1px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
  color: var(--muted);
  transition: 0.2s;
}

.jump-btn:hover {
  background: var(--gold);
  color: white;
  border-color: var(--gold);
}

  input[type=text]:focus { border-color: var(--gold); }

  .btn {
    background: var(--gold);
    color: white;
    border: none;
    border-radius: 4px;
    padding: 10px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    white-space: nowrap;
  }

  .btn:hover { background: #b07820; }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { background: var(--muted); cursor: not-allowed; }

  .btn-outline {
    background: transparent;
    color: var(--ink);
    border: 1.5px solid var(--border);
  }

  .btn-outline:hover { background: var(--cream); border-color: var(--ink); }

  .filter-tabs {
    max-width: 900px;
    margin: 16px auto 0;
    padding: 0 24px;
    display: flex;
    gap: 0;
    border-bottom: 2px solid var(--border);
  }

  .tab {
    padding: 8px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    transition: all 0.2s;
  }

  .tab.active { color: var(--gold); border-bottom-color: var(--gold); }
  .tab:hover { color: var(--ink); }

  .api-section {
    max-width: 900px;
    margin: 24px auto 0;
    padding: 0 24px;
  }

  .api-box {
    background: var(--cream);
    border: 1.5px solid var(--border);
    border-radius: 6px;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .api-box label {
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
  }

  .api-box input {
    flex: 1;
    min-width: 200px;
    background: var(--card-bg);
    border: 1.5px solid var(--border);
    border-radius: 4px;
    padding: 8px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--ink);
    outline: none;
    letter-spacing: 1px;
  }

  .api-box input:focus { border-color: var(--gold); }

  .progress-wrap {
    max-width: 900px;
    margin: 16px auto 0;
    padding: 0 24px;
    display: none;
  }

  .progress-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--gold);
    border-radius: 2px;
    width: 0%;
    transition: width 0.3s;
  }

  .progress-text {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    margin-top: 6px;
  }

  main {
    max-width: 900px;
    margin: 24px auto 60px;
    padding: 0 24px;
  }

  .word-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 16px;
  }

  .word-card {
    background: var(--card-bg);
    border: 1.5px solid var(--border);
    border-radius: 6px;
    padding: 20px 22px;
    position: relative;
    transition: box-shadow 0.2s, transform 0.15s;
    cursor: default;
  }

  .word-card:hover {
    box-shadow: 4px 4px 0 var(--border);
    transform: translate(-2px, -2px);
  }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 10px;
  }

  .word-main {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1;
  }

  .word-num {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    margin-top: 4px;
    white-space: nowrap;
  }

  .phonetic {
    font-size: 18px;
    color: var(--teal);
    margin-bottom: 6px;
    letter-spacing: 0.5px;
  }

  .definition {
    font-size: 18px;
    color: var(--muted);
    line-height: 1.6;
    padding-bottom: 12px;
    border-bottom: 1px dashed var(--border);
    margin-bottom: 12px;
  }

  .sentence-area {
    min-height: 48px;
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }

  .sentence-icon {
    color: var(--gold);
    font-size: 14px;
    margin-top: 2px;
    flex-shrink: 0;
  }

  .sentence-text {
    font-size: 16px;
    line-height: 1.7;
    color: var(--ink);
    font-style: italic;
    flex: 1;
  }

  .sentence-placeholder {
    font-size: 12px;
    color: var(--border);
    font-style: normal;
    letter-spacing: 0.5px;
  }

  .sentence-loading {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--muted);
    font-size: 12px;
  }

  .dot-anim {
    display: inline-flex;
    gap: 3px;
  }

  .dot-anim span {
    width: 4px; height: 4px;
    background: var(--gold);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
    display: inline-block;
  }

  .dot-anim span:nth-child(2) { animation-delay: 0.2s; }
  .dot-anim span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-5px); opacity: 1; }
  }

  .card-corner {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 20px;
    height: 20px;
    border-top: 2px solid var(--border);
    border-right: 2px solid var(--border);
    border-radius: 0 4px 0 0;
    opacity: 0.5;
  }

  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 2px;
    white-space: nowrap;
  }

  .badge-ready { background: #e8f5e9; color: #388e3c; }
  .badge-pending { background: var(--cream); color: var(--muted); }
  .badge-loading { background: #fff3d0; color: #c8922a; }

  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }

  .empty-state .big-char {
    font-family: 'Playfair Display', serif;
    font-size: 80px;
    color: var(--border);
    line-height: 1;
    margin-bottom: 16px;
  }

  .pagination {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 32px;
    flex-wrap: wrap;
  }

  .page-btn {
    width: 36px; height: 36px;
    background: var(--card-bg);
    border: 1.5px solid var(--border);
    border-radius: 4px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .page-btn:hover { background: var(--cream); }
  .page-btn.active { background: var(--gold); color: white; border-color: var(--gold); }
  .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .page-info {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    padding: 0 8px;
  }

  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--ink);
    color: var(--paper);
    padding: 12px 20px;
    border-radius: 4px;
    font-size: 12px;
    letter-spacing: 0.5px;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.3s;
    pointer-events: none;
    z-index: 999;
    max-width: 300px;
  }

  .toast.show { opacity: 1; transform: translateY(0); }

  .generated-mark {
    position: absolute;
    bottom: 10px;
    right: 14px;
    font-size: 9px;
    color: var(--teal);
    letter-spacing: 1px;
    opacity: 0.6;
  }
</style>
</head>
<body>
  <header>
  <div class="header-inner">
    <div class="header-label">IELTS · 雅思词汇记忆本</div>
    <h1>My Vocabulary<br>Notebook</h1>
    <div class="header-sub">3575 个待攻克的词汇 · AI 生成记忆例句 · 专为雅思备考设计</div>
    <div class="stats-bar">
      <div class="stat">
        <span class="stat-num" id="totalCount">3575</span>
        <span class="stat-label">总词汇</span>
      </div>
      <div class="stat">
        <span class="stat-num" id="generatedCount">0</span>
        <span class="stat-label">已生成例句</span>
      </div>
      <div class="stat">
        <span class="stat-num" id="filterCount">3575</span>
        <span class="stat-label">当前显示</span>
      </div>
    </div>
  </div>
</header>

<div class="api-section">
  <div class="api-box">
    <label>API Key</label>
    <input type="password" id="apiKeyInput" placeholder="sk-ant-api03-..." autocomplete="off">
    <button class="btn" onclick="startGenerate()" id="generateBtn">✦ 生成例句</button>
    <button class="btn btn-outline" onclick="generateCurrent()">生成当前页</button>
  </div>
</div>

<div class="progress-wrap" id="progressWrap">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-text" id="progressText">准备中...</div>
</div>

<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">◎</span>
    <input type="text" id="searchInput" placeholder="搜索单词或定义..." oninput="doSearch()">
  </div>
  <button class="btn btn-outline" onclick="exportData()">↓ 导出数据</button>
</div>

<div class="filter-tabs">
  <button class="tab active" onclick="setFilter('all', this)">全部</button>
  <button class="tab" onclick="setFilter('generated', this)">已生成</button>
  <button class="tab" onclick="setFilter('pending', this)">未生成</button>
</div>

<main>
  <div class="word-grid" id="wordGrid"></div>
  <div id="emptyState" class="empty-state" style="display:none">
    <div class="big-char">∅</div>
    <div>没有找到匹配的词汇</div>
  </div>
  <div class="pagination" id="pagination"></div>
</main>

<div class="toast" id="toast"></div>

const PAGE_SIZE = 20;
let currentPage = 1;
let currentFilter = 'all';
let searchQuery = '';
let isGenerating = false;
let generateAbort = false;

// Load saved sentences from localStorage
try {
  const saved = localStorage.getItem('ielts_sentences');
  if (saved) Object.assign(sentences, JSON.parse(saved));
} catch(e) {}

function saveSentences() {
  try { localStorage.setItem('ielts_sentences', JSON.stringify(sentences)); } catch(e) {}
}

function getFilteredData() {
  let data = VOCAB_DATA;
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    data = data.filter(w => w.word.toLowerCase().includes(q) || w.definition.includes(q));
  }
  if (currentFilter === 'generated') data = data.filter(w => sentences[w.word]);
  if (currentFilter === 'pending') data = data.filter(w => !sentences[w.word]);
  return data;
}

function setFilter(f, el) {
  currentFilter = f;
  currentPage = 1;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
}

function doSearch() {
  searchQuery = document.getElementById('searchInput').value;
  currentPage = 1;
  render();
}

function updateStats() {
  document.getElementById('generatedCount').textContent = Object.keys(sentences).length;
  const filtered = getFilteredData();
  document.getElementById('filterCount').textContent = filtered.length;
}

function render() {
  const data = getFilteredData();
  const totalPages = Math.max(1, Math.ceil(data.length / PAGE_SIZE));
  if (currentPage > totalPages) currentPage = totalPages;

  const start = (currentPage - 1) * PAGE_SIZE;
  const pageData = data.slice(start, start + PAGE_SIZE);

  const grid = document.getElementById('wordGrid');
  const empty = document.getElementById('emptyState');

  if (pageData.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
  } else {
    empty.style.display = 'none';
    grid.innerHTML = pageData.map((w, i) => {
      const idx = VOCAB_DATA.findIndex(v => v.word === w.word) + 1;
      const sent = sentences[w.word];
      let sentHtml;
      if (sent === '__loading__') {
        sentHtml = `<div class="sentence-loading"><div class="dot-anim"><span></span><span></span><span></span></div> 生成中...</div>`;
      } else if (sent) {
        sentHtml = `<span class="sentence-icon">❝</span><span class="sentence-text">${escHtml(sent)}</span>`;
      } else {
        sentHtml = `<span class="sentence-placeholder">—— 暂无例句</span>`;
      }
      const badgeHtml = sent && sent !== '__loading__' ? 
        `<span class="status-badge badge-ready">✓ 已生成</span>` :
        sent === '__loading__' ? `<span class="status-badge badge-loading">⋯ 生成中</span>` :
        `<span class="status-badge badge-pending">待生成</span>`;
      return `<div class="word-card" id="card-${w.word.replace(/[^a-zA-Z]/g,'_')}">
        <div class="card-corner"></div>
        <div class="card-top">
          <div>
            <div class="word-main">${escHtml(w.word)}</div>
            <div class="word-num">#${idx}</div>
          </div>
          ${badgeHtml}
        </div>
        <div class="phonetic">${escHtml(w.phonetic || '')}</div>
        <div class="definition">${escHtml(w.definition)}</div>
        <div class="sentence-area">${sentHtml}</div>
        ${sent && sent !== '__loading__' ? '<div class="generated-mark">AI · IELTS</div>' : ''}
      </div>`;
    }).join('');
  }

  renderPagination(totalPages);
  updateStats();
}

function renderPagination(totalPages) {
  const pg = document.getElementById('pagination');
  if (totalPages <= 1) { pg.innerHTML = ''; return; }

  let html = '';
  
  // 1. 原有的：左侧切换按钮
  html += `<button class="page-btn" onclick="goPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>‹</button>`;

  // 2. 原有的：数字页码逻辑 (这里保留了你最核心的数字按钮生成)
  const start = Math.max(1, currentPage - 2);
  const end = Math.min(totalPages, currentPage + 2);

  if (start > 1) {
    html += `<button class="page-btn" onclick="goPage(1)">1</button>`;
    if (start > 2) html += `<span style="color:var(--muted)">...</span>`;
  }

  for (let i = start; i <= end; i++) {
    html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
  }

  if (end < totalPages) {
    if (end < totalPages - 1) html += `<span style="color:var(--muted)">...</span>`;
    html += `<button class="page-btn" onclick="goPage(${totalPages})">${totalPages}</button>`;
  }

  // 3. 原有的：右侧切换按钮
  html += `<button class="page-btn" onclick="goPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>›</button>`;

  // 4. 新增的：跳转输入框和按钮
  // 注意：onkeyup 事件监听了 Enter (keyCode 13)
  html += `
    <div class="jump-group">
      <input type="number" id="jumpInput" class="jump-input" 
             placeholder="${currentPage}" 
             onkeyup="if(event.keyCode===13) handleJump(${totalPages})">
      <button class="jump-btn" onclick="handleJump(${totalPages})">跳转</button>
    </div>
  `;

  pg.innerHTML = html;
}

function handleJump(totalPages) {
  const input = document.getElementById('jumpInput');
  const val = parseInt(input.value);

  if (!isNaN(val) && val >= 1 && val <= totalPages) {
    goPage(val);
  } else {
    // 使用你代码中原有的 showToast 提示用户
    showToast(`请输入 1 到 ${totalPages} 之间的页码`);
    input.value = '';
    input.focus();
  }
}

function goPage(p) {
  const data = getFilteredData();
  const totalPages = Math.ceil(data.length / PAGE_SIZE);
  if (p < 1 || p > totalPages) return;
  currentPage = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg, duration=3000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

async function callAPI(apiKey, words) {
  const wordsText = words.map((w,i) => `${i+1}. ${w.word} (${w.definition})`).join('\n');
  const prompt = `You are helping Chinese students memorize IELTS vocabulary.

For each word below, write ONE example sentence in English. Requirements:
1. Keep sentences SHORT (max 12 words)
2. Make them MEMORABLE with clear context showing the word meaning
3. Use IELTS-level vocabulary (not too rare, not too simple)
4. The sentence must naturally show what the word means

Return ONLY a valid JSON array. Each object must have exactly "word" and "sentence" fields. No markdown, no explanation.

Words:
${wordsText}`;

  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      messages: [{ role: 'user', content: prompt }]
    })
  });

  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err.error?.message || `HTTP ${resp.status}`);
  }

  const data = await resp.json();
  const text = data.content.map(c => c.text || '').join('');
  const clean = text.replace(/```json|```/g, '').trim();
  return JSON.parse(clean);
}

async function startGenerate() {
  const apiKey = document.getElementById('apiKeyInput').value.trim();
  if (!apiKey) { showToast('请先输入 API Key'); return; }
  if (isGenerating) { generateAbort = true; showToast('正在停止...'); return; }

  const pending = VOCAB_DATA.filter(w => !sentences[w.word]);
  if (pending.length === 0) { showToast('所有单词已生成例句！'); return; }

  isGenerating = true;
  generateAbort = false;
  document.getElementById('generateBtn').textContent = '■ 停止';

  const progressWrap = document.getElementById('progressWrap');
  progressWrap.style.display = 'block';

  const BATCH = 15;
  let done = 0;
  const total = pending.length;

  for (let i = 0; i < pending.length; i += BATCH) {
    if (generateAbort) break;
    const batch = pending.slice(i, i + BATCH);
    
    // Mark as loading
    batch.forEach(w => { sentences[w.word] = '__loading__'; });
    render();

    try {
      const results = await callAPI(apiKey, batch);
      results.forEach(r => {
        if (r.word && r.sentence) sentences[r.word] = r.sentence;
      });
      // Clear any still loading from this batch
      batch.forEach(w => { if (sentences[w.word] === '__loading__') delete sentences[w.word]; });
    } catch(e) {
      batch.forEach(w => { if (sentences[w.word] === '__loading__') delete sentences[w.word]; });
      showToast('生成出错: ' + e.message, 5000);
      if (e.message.includes('401') || e.message.includes('403')) break;
    }

    done += batch.length;
    saveSentences();
    const pct = Math.round(done / total * 100);
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressText').textContent = `已处理 ${done}/${total} 个单词 (${pct}%)`;
    render();
    
    if (i + BATCH < pending.length && !generateAbort) {
      await new Promise(r => setTimeout(r, 500));
    }
  }

  isGenerating = false;
  generateAbort = false;
  document.getElementById('generateBtn').textContent = '✦ 生成例句';
  const genCount = Object.keys(sentences).length;
  showToast(`完成！共 ${genCount} 个词汇已生成例句`, 4000);
  render();
}

async function generateCurrent() {
  const apiKey = document.getElementById('apiKeyInput').value.trim();
  if (!apiKey) { showToast('请先输入 API Key'); return; }
  if (isGenerating) { showToast('已有生成任务进行中'); return; }

  const data = getFilteredData();
  const start = (currentPage - 1) * PAGE_SIZE;
  const pageData = data.slice(start, start + PAGE_SIZE);
  const pending = pageData.filter(w => !sentences[w.word]);

  if (pending.length === 0) { showToast('当前页面已全部生成'); return; }

  isGenerating = true;
  pending.forEach(w => { sentences[w.word] = '__loading__'; });
  render();

  try {
    const results = await callAPI(apiKey, pending);
    results.forEach(r => { if (r.word && r.sentence) sentences[r.word] = r.sentence; });
    pending.forEach(w => { if (sentences[w.word] === '__loading__') delete sentences[w.word]; });
    saveSentences();
    showToast(`当前页 ${results.length} 个词汇已生成`);
  } catch(e) {
    pending.forEach(w => { if (sentences[w.word] === '__loading__') delete sentences[w.word]; });
    showToast('生成出错: ' + e.message, 5000);
  }

  isGenerating = false;
  render();
}

function exportData() {
  const out = VOCAB_DATA.map(w => ({
    word: w.word,
    phonetic: w.phonetic,
    definition: w.definition,
    sentence: sentences[w.word] || ''
  }));
  const blob = new Blob([JSON.stringify(out, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'ielts_vocab_with_sentences.json';
  a.click();
  showToast('导出成功！');
}

render();
</script>
