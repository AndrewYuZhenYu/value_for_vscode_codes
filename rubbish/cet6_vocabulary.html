<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>六级词汇阅读库 · CET-6 Lexicon</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Noto+Serif+SC:wght@400;600&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,600;1,8..60,300&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1209;
    --paper: #f5f0e8;
    --paper2: #ede7d9;
    --amber: #c8860a;
    --amber-light: #e8a820;
    --amber-pale: #fdf3dc;
    --red: #8b2500;
    --teal: #1a5c5a;
    --highlight: rgba(200, 134, 10, 0.22);
    --highlight-hover: rgba(200, 134, 10, 0.45);
    --shadow: rgba(26,18,9,0.13);
    --serif: 'Source Serif 4', 'Noto Serif SC', serif;
    --display: 'Playfair Display', serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--serif);
    font-size: 17px;
    line-height: 1.85;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 10% 0%, rgba(200,134,10,0.07) 0%, transparent 55%),
      radial-gradient(ellipse at 90% 100%, rgba(26,92,90,0.06) 0%, transparent 50%),
      url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  }

  /* ── HEADER ── */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(245,240,232,0.94);
    backdrop-filter: blur(12px);
    border-bottom: 2px solid var(--amber);
    padding: 0 2rem;
    display: flex; align-items: center; justify-content: space-between;
    height: 62px;
    box-shadow: 0 2px 18px var(--shadow);
  }
  .logo {
    font-family: var(--display);
    font-size: 1.35rem;
    color: var(--amber);
    letter-spacing: .04em;
    font-style: italic;
  }
  .logo span { color: var(--ink); font-style: normal; font-size: .85rem; margin-left: .4em; }
  .header-stats {
    font-size: .78rem;
    color: var(--teal);
    letter-spacing: .06em;
    text-transform: uppercase;
  }

  /* ── HERO ── */
  .hero {
    text-align: center;
    padding: 5rem 2rem 3.5rem;
    position: relative;
  }
  .hero::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, rgba(200,134,10,0.04), transparent);
    pointer-events: none;
  }
  .hero-eyebrow {
    font-size: .72rem;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 1.2rem;
  }
  .hero h1 {
    font-family: var(--display);
    font-size: clamp(2.4rem, 6vw, 4.2rem);
    line-height: 1.1;
    color: var(--ink);
    margin-bottom: 1.2rem;
  }
  .hero h1 em {
    font-style: italic;
    color: var(--amber);
  }
  .hero p {
    max-width: 560px;
    margin: 0 auto 2.5rem;
    color: #5a4a30;
    font-size: .95rem;
  }
  .ornament {
    color: var(--amber);
    font-size: 1.5rem;
    letter-spacing: .3em;
    opacity: .6;
    margin-bottom: 3rem;
  }

  /* ── LAYOUT ── */
  .container {
    max-width: 1180px;
    margin: 0 auto;
    padding: 0 2rem;
    display: grid;
    grid-template-columns: 240px 1fr;
    gap: 3rem;
    align-items: start;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    position: sticky;
    top: 80px;
    max-height: calc(100vh - 100px);
    overflow-y: auto;
    padding-right: .5rem;
    scrollbar-width: thin;
    scrollbar-color: var(--amber-light) transparent;
  }
  .sidebar h3 {
    font-family: var(--display);
    font-size: .82rem;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 1rem;
    padding-bottom: .5rem;
    border-bottom: 1px solid var(--amber-light);
  }
  .toc-item {
    display: block;
    padding: .38rem .7rem;
    font-size: .83rem;
    color: #5a4a30;
    text-decoration: none;
    border-radius: 4px;
    transition: all .18s;
    margin-bottom: 2px;
    border-left: 2px solid transparent;
  }
  .toc-item:hover, .toc-item.active {
    background: var(--amber-pale);
    color: var(--amber);
    border-left-color: var(--amber);
  }
  .toc-num {
    font-size: .7rem;
    opacity: .5;
    margin-right: .3em;
  }
  .search-box {
    width: 100%;
    padding: .5rem .8rem;
    border: 1.5px solid var(--paper2);
    border-radius: 6px;
    font-family: var(--serif);
    font-size: .84rem;
    background: white;
    color: var(--ink);
    margin-bottom: 1.2rem;
    transition: border-color .2s;
    outline: none;
  }
  .search-box:focus { border-color: var(--amber); }

  /* ── ARTICLES ── */
  .articles { padding-bottom: 6rem; }

  .article-card {
    background: white;
    border-radius: 10px;
    padding: 2.5rem 2.8rem;
    margin-bottom: 2.8rem;
    box-shadow: 0 2px 20px var(--shadow), 0 0 0 1px rgba(200,134,10,.08);
    position: relative;
    transition: box-shadow .25s;
  }
  .article-card:hover {
    box-shadow: 0 6px 32px var(--shadow), 0 0 0 1px rgba(200,134,10,.15);
  }
  .article-tag {
    display: inline-block;
    font-size: .67rem;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: white;
    background: var(--teal);
    padding: .22em .7em;
    border-radius: 3px;
    margin-bottom: .9rem;
  }
  .article-card h2 {
    font-family: var(--display);
    font-size: 1.55rem;
    line-height: 1.25;
    color: var(--ink);
    margin-bottom: 1.3rem;
  }
  .article-body {
    font-size: .96rem;
    line-height: 1.95;
    color: #2c2010;
    text-align: justify;
  }
  .article-body p { margin-bottom: 1.1em; }
  .article-footer {
    margin-top: 1.5rem;
    padding-top: 1rem;
    border-top: 1px dashed #d4c9a8;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: .78rem;
    color: #9a8060;
  }
  .word-count-badge {
    background: var(--amber-pale);
    color: var(--amber);
    padding: .2em .7em;
    border-radius: 3px;
    font-size: .72rem;
    letter-spacing: .07em;
  }

  /* ── HIGHLIGHTED WORDS ── */
  .cet6 {
    background: var(--highlight);
    border-bottom: 1.5px solid var(--amber-light);
    border-radius: 2px;
    padding: 0 1px;
    cursor: pointer;
    transition: background .15s, border-color .15s;
    position: relative;
    text-decoration: none;
    color: inherit;
  }
  .cet6:hover {
    background: var(--highlight-hover);
    border-bottom-color: var(--amber);
  }

  /* ── TOOLTIP ── */
  #tooltip {
    position: fixed;
    z-index: 9999;
    background: var(--ink);
    color: #f5f0e8;
    border-radius: 8px;
    padding: .9rem 1.2rem;
    max-width: 280px;
    box-shadow: 0 8px 32px rgba(0,0,0,.35);
    pointer-events: none;
    opacity: 0;
    transform: translateY(6px) scale(.97);
    transition: opacity .18s, transform .18s;
    font-family: var(--serif);
    font-size: .88rem;
    line-height: 1.6;
    border: 1px solid rgba(200,134,10,.3);
  }
  #tooltip.show {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
  #tooltip .tip-word {
    font-family: var(--display);
    font-size: 1.1rem;
    color: var(--amber-light);
    font-style: italic;
    display: block;
    margin-bottom: .3rem;
  }
  #tooltip .tip-phonetic {
    font-size: .78rem;
    color: #aaa;
    display: block;
    margin-bottom: .4rem;
  }
  #tooltip .tip-pos {
    font-size: .72rem;
    color: var(--amber-light);
    background: rgba(200,134,10,.18);
    padding: .1em .45em;
    border-radius: 3px;
    margin-right: .4em;
  }
  #tooltip .tip-def {
    color: #e8e0d0;
  }
  #tooltip .tip-example {
    margin-top: .5rem;
    padding-top: .5rem;
    border-top: 1px solid rgba(255,255,255,.1);
    font-size: .8rem;
    color: #c0b8a8;
    font-style: italic;
  }

  /* ── PROGRESS BAR ── */
  .progress-bar {
    position: fixed;
    top: 62px; left: 0;
    height: 3px;
    background: linear-gradient(to right, var(--amber), var(--amber-light));
    width: 0%;
    z-index: 99;
    transition: width .1s;
  }

  /* ── BACK TO TOP ── */
  #back-top {
    position: fixed;
    bottom: 2.5rem; right: 2.5rem;
    width: 44px; height: 44px;
    background: var(--amber);
    color: white;
    border: none; cursor: pointer;
    border-radius: 50%;
    font-size: 1.1rem;
    box-shadow: 0 4px 16px rgba(200,134,10,.4);
    transition: all .2s;
    opacity: 0; pointer-events: none;
    display: flex; align-items: center; justify-content: center;
  }
  #back-top.show { opacity: 1; pointer-events: auto; }
  #back-top:hover { transform: translateY(-3px); box-shadow: 0 7px 22px rgba(200,134,10,.5); }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    padding: 3rem 2rem;
    border-top: 1px solid var(--paper2);
    font-size: .78rem;
    color: #9a8060;
    letter-spacing: .05em;
  }

  @media (max-width: 800px) {
    .container { grid-template-columns: 1fr; }
    .sidebar { position: static; max-height: none; }
    .article-card { padding: 1.6rem; }
  }
</style>
</head>
<body>

<div class="progress-bar" id="progress"></div>

<header>
  <div class="logo">CET-6 Lexicon <span>六级词汇精读库</span></div>
  <div class="header-stats">30 篇文章 · ~6000 词汇 · 点击高亮词查看释义</div>
</header>

  <div class="hero-eyebrow">★ 大学英语六级 ★</div>

  <div class="ornament">❧ ✦ ❧</div>
</div>

<div class="container">

    <input type="text" class="search-box" id="searchBox" placeholder="🔍 搜索文章…">

    <nav id="toc"></nav>
  </aside>

  <main class="articles" id="articles"></main>
</div>

<div id="tooltip"></div>

<button id="back-top" title="返回顶部">↑</button>

<footer>

</footer>

Affordable housing represents one of the most acute and politically contentious challenges confronting major cities worldwide. As urban areas attract knowledge workers and investment, property values tend to rise, progressively displacing lower-income residents from the neighborhoods where they have established their lives and communities. The consequences include longer commutes, weakened social networks, increased homelessness, and the erosion of the economic diversity that makes cities genuinely vital rather than merely exclusive enclaves for the affluent. Addressing this crisis requires a combination of supply-side reforms—reducing regulatory barriers to housing construction—and demand-side interventions, including subsidized housing and robust tenant protections.

// Build a sorted list of vocab words for faster matching
const vocabWords = Object.keys(vocab).sort((a,b) => b.length - a.length);

function highlightText(text) {
  // Replace CET-6 words with highlighted spans
  let result = text;
  
  // We'll build a regex that matches word boundaries for all vocab words
  // Process longest words first to avoid partial matches
  const escaped = vocabWords.map(w => w.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
  const pattern = new RegExp('\\b(' + escaped.join('|') + ')\\b', 'gi');
  
  result = result.replace(pattern, (match) => {
    const lower = match.toLowerCase();
    if (vocab[lower]) {
      return `<span class="cet6" data-word="${lower}">${match}</span>`;
    }
    return match;
  });
  return result;
}

// TOOLTIP
// ═══════════════════════════════════════════════════════════
const tooltip = document.getElementById('tooltip');
let hideTimer;

document.addEventListener('click', (e) => {
  const target = e.target.closest('.cet6');
  if (target) {
    const word = target.dataset.word;
    const info = vocab[word];
    
    if (info) {
      const [pos, def, example] = info;
      tooltip.innerHTML = `
        <span class="tip-word">${word}</span>
        <span class="tip-pos">${pos}</span><span class="tip-def">${def}</span>
        <div class="tip-example">${example}</div>
      `;
      
      // 【修复关键点】：因为 tooltip 是 position: fixed，
      // 所以直接使用相对于视口的 rect.left 和 rect.bottom 即可，千万不要加 window.scrollY
      const rect = target.getBoundingClientRect();
      let left = rect.left;
      let top = rect.bottom + 8;
      
      // 防止提示框超出屏幕右侧边界
      const tipW = 280;
      if (left + tipW > window.innerWidth - 20) {
        left = window.innerWidth - tipW - 20;
      }
      
      // 防止提示框超出屏幕底部边界（如果底部空间不足，就显示在单词上方）
      // 预估提示框高度大约 100px
      if (top + 100 > window.innerHeight) {
        top = rect.top - 108; // 向上偏移
      }
      
      tooltip.style.left = left + 'px';
      tooltip.style.top = top + 'px';
      tooltip.classList.add('show');
      
      // 重置定时器，4秒后自动隐藏
      clearTimeout(hideTimer);
      hideTimer = setTimeout(() => tooltip.classList.remove('show'), 4000);
    }
    e.stopPropagation();
  } else {
    // 点击页面其他空白区域时，立刻隐藏提示框
    tooltip.classList.remove('show');
  }
});
    tocItem.className = 'toc-item';

    toc.appendChild(tocItem);
  });
}


// Search
document.getElementById('searchBox').addEventListener('input', function() {
  const q = this.value.toLowerCase();
  document.querySelectorAll('.article-card').forEach((card, i) => {
    const title = articles[i].title.toLowerCase();
    const tag = articles[i].tag.toLowerCase();
    card.style.display = (!q || title.includes(q) || tag.includes(q)) ? '' : 'none';
  });
  document.querySelectorAll('.toc-item').forEach((item, i) => {
    const title = articles[i].title.toLowerCase();
    const tag = articles[i].tag.toLowerCase();
    item.style.display = (!q || title.includes(q) || tag.includes(q)) ? '' : 'none';
  });
});
